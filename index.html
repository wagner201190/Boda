<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Invitación de Boda | Yennifer & Wagner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Montserrat', sans-serif;
      background:#f7f6f2;
      color:#1f2937;
      overflow-x:hidden;
    }

    :root{
      --gold:#c9a86a;
      --blue:#17324d;
      --olive:#6b7555;
      --white:#ffffff;
      --light:#f8f6f1;
    }

    header{
      height:100vh;
      background:
        linear-gradient(rgba(10,20,35,.55), rgba(10,20,35,.55)),
        url('W&Y-07881.jpg') center center/cover no-repeat;

      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero{
      max-width:900px;
      animation:fadeIn 2s ease;
    }

    .hero h3{
      display: inline-block;
      font-size: 1rem;
      letter-spacing: 6px;
      font-weight: 500;
      color: var(--gold);
      margin-bottom: 25px;
      padding: 12px 30px;
      border: 1px solid rgba(201, 168, 106, 0.6);
      background: rgba(23, 50, 77, 0.45);
      backdrop-filter: blur(6px);
      border-radius: 50px;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .hero h1{
      font-family:'Cormorant Garamond', serif;
      font-size:5rem;
      font-weight:600;
      margin-bottom:10px;
    }

    .hero p{
      font-size:1.2rem;
      line-height:1.8;
    }

    .btn{
      display:inline-block;
      margin-top:30px;
      padding:15px 35px;
      border:1px solid var(--gold);
      color:white;
      text-decoration:none;
      letter-spacing:2px;
      transition:.3s;
      background:rgba(201,168,106,.15);
      backdrop-filter:blur(4px);
    }

    .btn:hover{
      background:var(--gold);
      transform:translateY(-3px);
    }

    section{
      padding:90px 10%;
    }
